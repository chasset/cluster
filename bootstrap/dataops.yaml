# code: language=ansible
# Orchestrateur de la couche plateforme DataOps (ADR 0033), à lancer APRÈS le
# bootstrap Kubernetes. Trois plays, dans l'ordre des dépendances inter-briques :
#   Play 1 (k8s) : registry + cert-manager + CNPG (manifestes figés platform/
#     appliqués via kubernetes.core).
#   Play 2 (nœuds) : config containerd registry interne + build des images.
#   Play 3 (k8s) : Dagster + Marquez (pull des images buildées au play 2).
#
# Ordre inter-briques : registry → cert-manager → CNPG → (build) → Dagster/Marquez.
#
# HÔTE D'EXÉCUTION k8s (`dataops_k8s_host`, défaut localhost) : les tâches
# kubernetes.core ciblent l'API via le KUBECONFIG de l'exécuteur. Banc Lima :
# localhost (kubeconfig rapatrié via port-forward). Prod : surcharger par un
# control-plane si l'on pilote depuis le nœud. Les libs Python `kubernetes` sont
# installées en pré-tâche sur cet hôte.
#
# Surcharges par topologie : group_vars d'inventaire non versionné
# (cf. bootstrap/group_vars/dataops.example.yaml). Défauts de rôle = prod.

- name: Plateforme DataOps — étape cluster (manifestes figés)
  hosts: "{{ dataops_k8s_host | default('localhost') }}"
  gather_facts: false
  # PAS d'audit-log ici : ce rôle écrit un log SYSTÈME (`/var/log`, sudo) sur un
  # NŒUD ; or dataops.yaml pilote l'API k8s depuis le poste de contrôle
  # (localhost) — y faire `become` exigerait un sudo sans objet (drift L21/L22).
  # L'audit-log reste sur les playbooks qui configurent des nœuds (bootstrap).
  #
  # SSL_CERT_FILE (drift L23) : le Python d'Ansible (ex. Homebrew) n'utilise pas
  # toujours le CA système → les requêtes HTTPS (get_url des CRDs, module k8s)
  # échouent en SSL. On pointe le bundle certifi de CE python (résolu en pré-tâche).
  environment:
    SSL_CERT_FILE: '{{ dataops_ca_bundle | default(omit) }}'
  pre_tasks:
    # kubernetes.core exige la lib Python `kubernetes` ; certifi fournit le CA.
    - name: Ensure the Python client libraries are present
      ansible.builtin.pip:
        name:
          - kubernetes
          - certifi
        state: present
    # Résout le bundle CA avec le MÊME interpréteur que les modules Ansible.
    - name: Resolve the certifi CA bundle path
      ansible.builtin.command: "{{ ansible_python_interpreter | default('python3') }} -c 'import certifi; print(certifi.where())'"
      register: dataops_certifi
      changed_when: false
    - name: Set the CA bundle for HTTPS requests
      ansible.builtin.set_fact:
        dataops_ca_bundle: '{{ dataops_certifi.stdout | trim }}'
  tasks:
    - name: Registry interne + CRDs Gateway API
      ansible.builtin.import_role:
        name: platform-registry
        tasks_from: cluster
      tags: registry-cluster

    # cert-manager AVANT cnpg : le plugin Barman exige le TLS plugin↔operator.
    - name: TLS interne (cert-manager, prérequis Barman)
      ansible.builtin.import_role:
        name: platform-cert-manager
      tags: cert-manager

    # CloudNativePG (operator + plugin Barman + cluster pg + bases). Dépend du
    # registry (pas directement) et de cert-manager ; cible le RGW Ceph.
    - name: Store PostgreSQL HA CloudNativePG (+ backups Barman)
      ansible.builtin.import_role:
        name: platform-cnpg
      tags: cnpg

- name: Plateforme DataOps — étape nœuds (containerd + build d'images)
  hosts: cloud
  tasks:
    - name: Configuration containerd pour le registry interne
      ansible.builtin.import_role:
        name: platform-registry
        tasks_from: node
      tags: registry-node

    # Build (arm64) / re-tag (x86) des images maison vers registry:80, APRÈS la
    # config containerd (push) et AVANT Dagster/Marquez (pull). gather_facts
    # requis : le rôle teste ansible_architecture.
    - name: Build des images maison de la chaîne DataOps
      ansible.builtin.import_role:
        name: platform-build-images
      tags: build-images

- name: Plateforme DataOps — étape applicative (Dagster + Marquez)
  hosts: "{{ dataops_k8s_host | default('localhost') }}"
  gather_facts: false
  tasks:
    # Dagster (orchestrateur vide) + Marquez (lineage) : pull des images
    # registry:80 buildées au play 2 ; dérivent leurs Secrets PG du rôle CNPG.
    - name: Orchestrateur Dagster (storage CNPG)
      ansible.builtin.import_role:
        name: platform-dagster
      tags: dagster

    - name: Store de lineage Marquez (storage CNPG)
      ansible.builtin.import_role:
        name: platform-marquez
      tags: marquez
