# code: language=ansible
- name: Install container runtime
  become: true
  become_method: ansible.builtin.sudo
  block:
    - name: System kernel attributes
      ansible.builtin.copy:
        content: |
          net.ipv4.ip_forward = 1
        dest: /etc/sysctl.d/k8s.conf
        mode: '644'

    - name: Reload system kernel
      ansible.builtin.command: sysctl --system

    - name: Gather facts on IPv4
      ansible.builtin.command: sysctl net.ipv4.ip_forward
      register: output_ipv4_forward
      changed_when: false

    - name: IPv4 forward is enabled
      ansible.builtin.debug:
        msg: '{{ output_ipv4_forward }}'
      when: output_ipv4_forward == "net.ipv4.ip_forward = 1"

    - name: Install APT dependencies
      ansible.builtin.apt:
        update_cache: yes
        name:
          - ca-certificates
          - apt-transport-https
          - curl
          - gpg
        state: present

    - name: Get Docker keyrings
      ansible.builtin.shell: sudo curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.asc

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}
          signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{
          ansible_distribution_release }} stable"
        state: present
        update_cache: yes

    - name: Install CRI
      ansible.builtin.apt:
        name: containerd.io
        state: present

    - name: Build a default containerd config
      ansible.builtin.command: containerd config default
      register: containerd_config
      changed_when: false

    - name: Copy default config into production
      ansible.builtin.copy:
        content: '{{ containerd_config.stdout }}'
        dest: /etc/containerd/config.toml

    - name: Change containerd default config
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'

    - name: Enable containerd service
      ansible.builtin.systemd_service:
        name: containerd
        daemon_reload: true
        enabled: true
        state: restarted
