# code: language=ansible
- name: Install kubernetes on control plane nodes
  block:
    - name: Initialize the cluster
      become: true
      become_method: ansible.builtin.sudo
      ansible.builtin.shell: kubeadm init >> cluster-setup.log
      args:
        chdir: /home/debian
        creates: cluster-setup.log

    - name: Create .kube directory
      become: true
      become_user: debian
      ansible.builtin.file:
        path: ${HOME}/.kube
        state: directory
        mode: 0755

    - name: Copy kubernetes configuration
      become: true
      become_method: ansible.builtin.sudo
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        remote_src: true
        dest: /home/debian/.kube/config
        owner: debian
        mode: '0600'

    # - name: Install CNI
    #   ansible.builtin.shell:
    #     kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml >>
    #     cni-setup.log
    #   args:
    #     chdir: /home/debian
    #     creates: cni-setup.log

    - name: Control plane accepts pods
      ansible.builtin.shell: kubectl taint nodes --all node-role.kubernetes.io/control-plane- >> taint-setup.log
      args:
        chdir: /home/debian
        creates: taint-setup.log

    - name: Control plane isn’t a load balancer, because it accepts pods
      ansible.builtin.shell: kubectl label nodes --all node.kubernetes.io/exclude-from-external-load-balancers- >> lb-setup.log
      args:
        chdir: /home/debian
        creates: lb-setup.log
