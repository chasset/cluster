# code: language=ansible
- name: Install kubernetes on control plane nodes
  block:
    - name: Initialize the control plane
      become: true
      become_method: ansible.builtin.sudo
      ansible.builtin.command: >-
        kubeadm init
        --control-plane-endpoint {{ control_plane_endpoint }}:{{ control_plane_port }}
        --upload-certs
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Create the .kube directory for the debian user
      ansible.builtin.file:
        path: /home/debian/.kube
        state: directory
        mode: '0755'

    - name: Copy kubernetes configuration
      become: true
      become_method: ansible.builtin.sudo
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        remote_src: true
        dest: /home/debian/.kube/config
        owner: debian
        mode: '0600'

    - name: Control plane accepts pods (remove the control-plane taint)
      ansible.builtin.shell: >-
        kubectl taint nodes --all node-role.kubernetes.io/control-plane-
        >> taint-setup.log
      args:
        chdir: /home/debian
        creates: taint-setup.log

    - name: Exclude the control plane from external load balancers
      ansible.builtin.shell: >-
        kubectl label nodes --all
        node.kubernetes.io/exclude-from-external-load-balancers-
        >> lb-setup.log
      args:
        chdir: /home/debian
        creates: lb-setup.log
