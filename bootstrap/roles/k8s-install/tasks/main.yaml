# code: language=ansible
- name: Install kubernetes components
  become: true
  become_method: ansible.builtin.sudo
  block:
    - name: Check apt dependencies
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gpg
        state: present

    - name: Get kubernetes keyrings
      ansible.builtin.shell:
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.31/deb/Release.key | sudo gpg --dearmor -o
        /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Add kubernetes repository
      ansible.builtin.apt_repository:
        repo: 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.31/deb/ /'
        state: present
        update_cache: yes

    - name: Install kubelet and kubeadm
      ansible.builtin.apt:
        name:
          - kubelet
          - kubeadm
        state: present

    - name: Mark packages to not upgrade
      ansible.builtin.command: apt-mark hold kubelet kubeadm

    - name: Enable and start kubernetes service
      ansible.builtin.systemd_service:
        name: kubelet
        daemon_reload: true
        enabled: true
        state: started

