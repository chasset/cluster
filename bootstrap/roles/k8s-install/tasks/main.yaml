# code: language=ansible
- name: Install kubernetes components
  become: true
  become_method: ansible.builtin.sudo
  block:
    - name: Check apt dependencies
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gpg
        state: present

    - name: Ensure the APT keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Get kubernetes keyrings
      ansible.builtin.shell: >-
        set -o pipefail &&
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.34/deb/Release.key
        | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      args:
        executable: /bin/bash
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Add kubernetes repository
      ansible.builtin.apt_repository:
        repo: 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.34/deb/ /'
        state: present
        update_cache: true

    - name: Install kubelet and kubeadm
      ansible.builtin.apt:
        name:
          - kubelet
          - kubeadm
        state: present

    - name: Hold kubelet and kubeadm at their installed version
      ansible.builtin.dpkg_selections:
        name: '{{ item }}'
        selection: hold
      loop:
        - kubelet
        - kubeadm

    - name: Enable and start kubernetes service
      ansible.builtin.systemd_service:
        name: kubelet
        daemon_reload: true
        enabled: true
        state: started
