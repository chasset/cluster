# code: language=ansible
- name: Join worker nodes to cluster
  become: true
  become_method: ansible.builtin.sudo
  block:
    - name: Test if primary control plane is reacheable
      ansible.builtin.wait_for:
        host: "{{ hostvars['dirqual1']['ansible_default_ipv4']['address'] }}"
        port: 6443
        timeout: 1

    - name: Join the cluster
      ansible.builtin.shell: "{{ hostvars['dirqual1'].join_command }} >> node-joined.log"
      args:
        chdir: /home/debian
        creates: node-joined.log
