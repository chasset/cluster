# code: language=ansible
- name: Join worker nodes to cluster
  become: true
  become_method: ansible.builtin.sudo
  block:
    - name: Wait for the primary control plane API to be reachable
      ansible.builtin.wait_for:
        host: "{{ hostvars[groups['control'][0]].ansible_default_ipv4.address }}"
        port: '{{ control_plane_port }}'
        timeout: 30

    - name: Join the cluster
      ansible.builtin.shell: "{{ hostvars[groups['control'][0]].join_command }} >> node-joined.log"
      args:
        chdir: /home/debian
        creates: node-joined.log
