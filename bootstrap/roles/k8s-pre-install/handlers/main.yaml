# code: language=ansible
- name: Disable swap
  block:
    - name: Disable all SWAP devices temporarily
      ansible.builtin.command: swapoff -a
      changed_when: true

    - name: Unmount swap # noqa: ignore-errors
      ansible.builtin.fail:
        msg: Not implemented
      when: true
      ignore_errors: true
      run_once: true

    - name: Disable SWAP partition in fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
        replace: '# \1'

    - name: Reboot
      ansible.builtin.reboot:
