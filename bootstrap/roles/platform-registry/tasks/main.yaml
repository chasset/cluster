# code: language=ansible
# Rôle platform-registry (ADR 0033) — deux volets, importés séparément selon
# l'hôte via `tasks_from` (cf. bootstrap/dataops.yaml) :
#   - tasks/cluster.yaml (tag registry-cluster) : CRDs Gateway API + manifestes
#     registry, depuis l'hôte qui pilote l'API (kubernetes.core).
#   - tasks/node.yaml (tag registry-node) : config containerd insecure-registry
#     sur chaque nœud (/etc/hosts + certs.d + use_local_image_pull, L9/L13).
#
# main.yaml (appel sans tasks_from) exécute les deux volets — à n'utiliser que si
# l'hôte cumule rôle de pilote API ET de nœud. En pratique dataops.yaml importe
# chaque volet sur le bon play (drift L24 : sans cette séparation, le volet node
# tournait par erreur sur le play cluster → sudo sur localhost).
- name: Registry — volet cluster
  ansible.builtin.import_tasks: cluster.yaml

- name: Registry — volet nœuds
  ansible.builtin.import_tasks: node.yaml
