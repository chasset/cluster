# yaml-language-server: $schema=https://json.schemastore.org/lefthook.json

# Enforce Conventional Commits + reject emails in commit messages
commit-msg:
  commands:
    no-emails:
      run: |
        if grep -qE '[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}' {1}; then
          echo "ERROR: commit message contains an email address." >&2
          exit 1
        fi
    commitlint:
      run: npx --no-install commitlint --edit {1}

# Fast checks on staged files only
pre-commit:
  parallel: true
  commands:
    prettier:
      glob: '*.{yaml,yml,md,json}'
      run: npx prettier --check {staged_files}
    yamllint:
      glob: '*.{yaml,yml}'
      run: yamllint {staged_files}
    shellcheck:
      glob: '*.sh'
      run: shellcheck {staged_files}

# Full-repo checks before pushing
pre-push:
  parallel: true
  commands:
    prettier:
      run: npx prettier --check "**/*.{yaml,yml,md,json}"
    yamllint:
      run: yamllint .
    shellcheck:
      run: |
        find . -name '*.sh' \
          -not -path './node_modules/*' \
          -not -path './.git/*' \
          -print0 | xargs -0 shellcheck
    kubeconform:
      run: |
        find . -name '*.yaml' \
          -not -path './bootstrap/*' \
          -not -path './apps/jupyter/config.yaml' \
          -not -path './node_modules/*' \
          -not -path './.git/*' \
          -print0 | xargs -0 kubeconform \
            -strict -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
    ansible-lint:
      run: ansible-lint bootstrap/
