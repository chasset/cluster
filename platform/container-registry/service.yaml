apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: registry
  annotations:
    tailscale.com/expose: 'true'
    tailscale.com/hostname: registry
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 5000
      protocol: TCP
      name: http
  selector:
    app: registry
