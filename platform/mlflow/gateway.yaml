# Exposition de l'UI MLflow via le Gateway Cilium + TLS interne (ADR 0020/0021/0082).
# Même patron que platform/marquez/gateway.yaml.
#
# MLflow est un SEUL serveur (API + UI sur le port 5000) : on expose le Service `mlflow`
# directement (pas de service web séparé comme Marquez). Les émetteurs (code atlas)
# joignent l'API par le Service ClusterIP `mlflow.mlflow.svc:5000` depuis le cluster.
#
# SANS auth : MLflow n'a pas d'auth native par défaut ; le cluster est sur un réseau
# privé de confiance (mono-admin, ADR 0003), comme Dagster/Marquez. Auth en bordure
# (oauth2-proxy) ultérieure. Secret TLS créé par cert-manager (cluster-issuer).
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: mlflow
  namespace: mlflow
  annotations:
    cert-manager.io/cluster-issuer: internal-ca
spec:
  gatewayClassName: cilium
  listeners:
    - name: websecure
      protocol: HTTPS
      port: 443
      hostname: mlflow.cluster.lan # TODO admin réseau (placeholder .lan)
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: mlflow-server-tls # créé/renouvelé par cert-manager
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mlflow
  namespace: mlflow
spec:
  parentRefs:
    - name: mlflow
      namespace: mlflow
      sectionName: websecure
  hostnames:
    - mlflow.cluster.lan # TODO admin réseau (placeholder .lan)
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mlflow
          port: 5000
