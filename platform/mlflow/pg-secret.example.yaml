# Patron VERSIONNÉ du Secret de connexion Postgres de MLflow (ADR 0023/0082).
#
# Le serveur MLflow lit le mot de passe du backend store via le Secret `mlflow-pg-auth`,
# clé `postgresql-password` (alignée sur Dagster, PAS `marquez-db-password`). On NE pointe
# PAS le Secret CNPG brut `pg-role-mlflow` (clés `username`/`password`).
#
# ⚠️ VALEUR DE TEST. Sur une topologie réelle : créer le vrai Secret hors dépôt (config
# locale non versionnée) en recopiant le mot de passe du rôle `mlflow` depuis le Secret CNPG :
#   kubectl -n postgres get secret pg-role-mlflow -o jsonpath='{.data.password}' | base64 -d
#   → placer cette valeur dans `postgresql-password` d'un Secret `mlflow-pg-auth` dans le ns
#     `mlflow`. Le rôle Ansible `platform-mlflow` dérive ce Secret automatiquement au banc.
---
apiVersion: v1
kind: Secret
metadata:
  name: mlflow-pg-auth
  namespace: mlflow
type: Opaque
stringData:
  postgresql-password: mlflow-test-password # valeur de test (banc)
