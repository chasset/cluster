# Ingress vers le serveur MLflow (port 5000) — API + UI partagent ce port.
# Joignable depuis le Gateway (UI bordure) ET les émetteurs intra-cluster (code atlas
# loggant ses runs via MLFLOW_TRACKING_URI). On n'ouvre que le port, pas de restriction
# de source ici (le default-deny des AUTRES ns + le port unique bornent la surface).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-ingress
  namespace: mlflow
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mlflow
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 5000
