apiVersion: v1
kind: Service
metadata:
  name: rook-ceph-rgw-datalake-external
  namespace: rook-ceph
  labels:
    app: rook-ceph-rgw
    rook_cluster: rook-ceph
    rook_object_store: datalake
spec:
  ports:
    - name: rgw
      port: 8080
      protocol: TCP
      targetPort: 8080
  selector:
    app: rook-ceph-rgw
    rook_cluster: rook-ceph
    rook_object_store: datalake
  sessionAffinity: None
  type: NodePort
